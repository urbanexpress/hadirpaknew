<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Tailwind CSS -->

<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
		// --- 1. INISIALISASI SUPABASE (BARU) ---
        const supabaseUrl = 'https://lioxhmqkkichbdwdelxg.supabase.co'; // Ganti ini
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxpb3hobXFra2ljaGJkd2RlbHhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwNzcxMTcsImV4cCI6MjA4NDY1MzExN30.0L0IctUNdnjQvvKcQ57TsES2_zAEZtaXbm4SpkUUmg0';      // Ganti ini
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // --- ICONS (Inline SVGs to replace Lucide dependency) ---
        const IconMapPin = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconUsers = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconSettings = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconFileText = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>;
        const IconLock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconLogOut = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
        const IconClock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconAlertTriangle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>;
        const IconCheckCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const IconDownload = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconPlus = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const IconTrash2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const IconEdit2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>;
        const IconX = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;

        // --- UTILS & CONSTANTS ---
        const DEFAULT_OFFICE = {
            lat: -6.9110265,
            lng: 107.7041281,
            radius: 50, // meters
            name: "Kantor Pusat"
        };

        const DEFAULT_PIN = "123456";

        // Wrapper aman untuk localStorage
        const safeStorage = {
            getItem: (key) => {
                try {
                return localStorage.getItem(key);
                } catch (e) {
                console.warn(`Gagal membaca ${key} dari localStorage`, e);
                return null;
                }
            },
            setItem: (key, value) => {
                try {
                localStorage.setItem(key, value);
                } catch (e) {
                console.warn(`Gagal menyimpan ${key} ke localStorage`, e);
                }
            }
        };

        const calculateDistance = (lat1, lon1, lat2, lon2) => {
            if (!lat1 || !lon1 || !lat2 || !lon2) return 0;
            const R = 6371e3; // metres
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        };

        const formatCurrency = (amount) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount);
        
        const formatDate = (dateString) => {
            if (!dateString) return '-';
            return new Date(dateString).toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        };

        const formatTime = (dateString) => {
            if (!dateString) return '--:--';
            return new Date(dateString).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        };

        // --- MAIN COMPONENT ---
        function App() {
            const [view, setView] = useState('home');
            const [userLocation, setUserLocation] = useState(null);
            const [distance, setDistance] = useState(null);
            const [errorMsg, setErrorMsg] = useState('');
            const [currentTime, setCurrentTime] = useState(new Date());

           // --- STATE DATA (Ganti logika localStorage dengan Array kosong dulu) ---
            // Kita set default dulu, nanti diisi otomatis oleh Supabase
            const [settings, setSettings] = useState({ ...DEFAULT_OFFICE, adminPin: DEFAULT_PIN });
            const [employees, setEmployees] = useState([]); 
            const [attendanceLogs, setAttendanceLogs] = useState([]);

            // --- FUNGSI TARIK DATA (FETCH) DARI SUPABASE ---
            const fetchData = async () => {
                try {
                    // 1. Ambil Settings
                    const { data: settingData } = await supabase.from('settings').select('*').single();
                    if (settingData) {
                        setSettings({
                            lat: settingData.office_lat,
                            lng: settingData.office_lng,
                            radius: settingData.radius_meters,
                            name: settingData.office_name,
                            adminPin: settingData.admin_pin
                        });
                    }

                    // 2. Ambil Karyawan
                    const { data: empData } = await supabase.from('employees').select('*').order('name', { ascending: true });
                    if (empData) {
                        // Mapping nama field database (snake_case) ke aplikasi (camelCase)
                        const mappedEmployees = empData.map(e => ({
                            id: e.id,
                            name: e.name,
                            shiftStart: e.shift_start.slice(0, 5), // Ambil HH:mm
                            shiftEnd: e.shift_end.slice(0, 5),
                            lateFee: e.late_fee,
                            overtimeFee: e.overtime_fee
                        }));
                        setEmployees(mappedEmployees);
                    }

                    // 3. Ambil Log Absensi (Hari ini saja biar ringan, atau 7 hari terakhir)
                    const { data: logData } = await supabase.from('attendance_logs')
                        .select('*')
                        .order('timestamp', { ascending: false });
                        
                    
                    if (logData) {
                        const mappedLogs = logData.map(l => ({
                            id: l.id,
                            employeeId: l.employee_id,
                            employeeName: l.employee_name,
                            date: l.date,
                            timestamp: l.timestamp, // Format ISO dari Supabase sudah cocok
                            type: l.type,
                            status: l.status,
                            penalty: l.penalty,
                            bonus: l.bonus,
                            note: l.note,
                            distance: l.distance_meters
                        }));
                        setAttendanceLogs(mappedLogs);
                    }

                } catch (error) {
                    console.error("Gagal mengambil data:", error);
                }
            };

            // --- EFFECT: JALANKAN SAAT APLIKASI BUKA ---
            useEffect(() => {
                fetchData(); // Tarik data saat pertama buka
                
                // Realtime Subscription (Agar update otomatis tanpa reload)
                const channel = supabase
                    .channel('realtime_changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'attendance_logs' }, () => {
                        fetchData(); // Jika ada absen baru, tarik data ulang
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'employees' }, () => {
                        fetchData(); // Jika ada karyawan baru/edit
                    })
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, () => {
                        fetchData(); // Jika setting berubah
                    })
                    .subscribe();

                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                
                return () => {
                    clearInterval(timer);
                    supabase.removeChannel(channel);
                };
            }, []);

            useEffect(() => {
                if (!navigator.geolocation) {
                    setErrorMsg("Browser tidak mendukung Geolocation.");
                    return;
                }

                const targetLat = settings.lat;
                const targetLng = settings.lng;

                const successHandler = (position) => {
                    const { latitude, longitude } = position.coords;
                    setUserLocation({ lat: latitude, lng: longitude });
                    const dist = calculateDistance(latitude, longitude, targetLat, targetLng);
                    setDistance(dist);
                    setErrorMsg('');
                };

                const errorHandler = (err) => {
                    console.warn("Geo Error:", err.message);
                    let msg = "Gagal mengambil lokasi.";
                    if (err.code === 1) msg = "Izin lokasi ditolak. Mohon izinkan akses GPS.";
                    else if (err.code === 2) msg = "Sinyal GPS lemah atau tidak tersedia.";
                    else if (err.code === 3) msg = "Waktu permintaan lokasi habis.";
                    setErrorMsg(msg);
                };

                const watchId = navigator.geolocation.watchPosition(successHandler, errorHandler, { enableHighAccuracy: true, maximumAge: 10000, timeout: 10000 });
                return () => navigator.geolocation.clearWatch(watchId);
            }, [settings.lat, settings.lng]);

           // --- FUNGSI ABSEN DENGAN DEVICE ID ---
            const handleAttendance = async (employeeId, type) => {
                if (!userLocation) {
                    alert("Lokasi belum ditemukan! Mohon tunggu sebentar.");
                    return;
                }

                // 1. SIAPKAN DEVICE ID
                // Cek apakah browser ini sudah punya ID unik. Kalau belum, buat baru.
                let deviceId = localStorage.getItem('app_device_id');
                if (!deviceId) {
                    // Generate ID acak sederhana
                    deviceId = 'dev_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
                    localStorage.setItem('app_device_id', deviceId);
                }

                console.log("Mengirim absen dari Device ID:", deviceId);

                try {
                    // 2. Panggil RPC dengan parameter p_device_id
                    const { data, error } = await supabase.rpc('submit_attendance', {
                        p_employee_id: parseInt(employeeId),
                        p_user_lat: userLocation.lat,
                        p_user_lng: userLocation.lng,
                        p_type: type,
                        p_device_id: deviceId // <--- KIRIM ID KE SINI
                    });

                    if (error) throw error;

                    if (!data.success) {
                        alert("GAGAL: " + data.message);
                    } else {
                        alert("SUKSES: " + data.message + "\nStatus: " + data.status);
                        fetchData();
                    }

                } catch (err) {
                    alert("Terjadi kesalahan sistem: " + err.message);
                }
            };
            // --------------------------------------- 

            return (
                <div className="min-h-screen">
                    <div className="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-10">
                        <div>
                            <h1 className="text-xl font-bold flex items-center gap-2"><IconMapPin className="w-5 h-5" /> HadirPak</h1>
                            <p className="text-xs opacity-90">{currentTime.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' })}</p>
                        </div>
                        <div>
                            {view === 'home' ? (
                                <button onClick={() => setView('admin-login')} className="bg-blue-700 hover:bg-blue-800 p-2 rounded-full text-xs font-semibold flex items-center gap-1 transition"><IconSettings className="w-4 h-4" /> Admin</button>
                            ) : (
                                <button onClick={() => setView('home')} className="bg-blue-700 hover:bg-blue-800 p-2 rounded-full text-xs font-semibold flex items-center gap-1 transition"><IconLogOut className="w-4 h-4" /> Keluar</button>
                            )}
                        </div>
                    </div>

                    <main className="p-4 max-w-md mx-auto md:max-w-2xl lg:max-w-4xl">
                        {view === 'home' && <EmployeeView employees={employees} userLocation={userLocation} distance={distance} settings={settings} errorMsg={errorMsg} currentTime={currentTime} onAttendance={handleAttendance} logs={attendanceLogs} />}
                        {view === 'admin-login' && <AdminLogin actualPin={settings.adminPin} onSuccess={() => setView('admin-dashboard')} />}
                        {view === 'admin-dashboard' && <AdminDashboard employees={employees} setEmployees={setEmployees} logs={attendanceLogs} settings={settings} setSettings={setSettings} />}
                    </main>
                </div>
            );
        }

        // --- SUB COMPONENTS ---

        function EmployeeView({ employees, userLocation, distance, settings, errorMsg, currentTime, onAttendance, logs }) {
            const [selectedId, setSelectedId] = useState('');
            const inRange = distance !== null && distance <= settings.radius;
            const today = new Date().toISOString().split('T')[0];
            const myLogsToday = logs.filter(l => l.date === today && l.employeeId === parseInt(selectedId));
            const hasIn = myLogsToday.find(l => l.type === 'IN');
            const hasOut = myLogsToday.find(l => l.type === 'OUT');

            return (
                <div className="space-y-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm text-center">
                        <div className="text-gray-500 text-sm uppercase tracking-wider font-semibold">Waktu Sekarang</div>
                        <div className="text-4xl font-mono font-bold text-gray-800 my-2">{currentTime.toLocaleTimeString('id-ID')}</div>
                        <div className={`mt-4 p-3 rounded-lg border flex items-center justify-center gap-2 ${errorMsg ? 'bg-red-50 border-red-200 text-red-600' : inRange ? 'bg-green-50 border-green-200 text-green-700' : 'bg-orange-50 border-orange-200 text-orange-700'}`}>
                            {errorMsg ? <><IconAlertTriangle className="w-5 h-5 flex-shrink-0" /> <span className="text-sm text-left">{errorMsg}</span></> : !userLocation ? <><div className="animate-spin rounded-full h-4 w-4 border-b-2 border-current"></div> Mencari lokasi...</> : <>
                                {inRange ? <IconCheckCircle className="w-5 h-5"/> : <IconAlertTriangle className="w-5 h-5"/>}
                                <span className="font-medium">{inRange ? "Dalam Jangkauan" : "Di Luar Jangkauan"} <span className="ml-1 text-sm opacity-75">({distance ? Math.round(distance) : 0}m)</span></span>
                            </>}
                        </div>
                        {!inRange && userLocation && !errorMsg && <p className="text-xs text-orange-600 mt-2">Max radius {settings.radius}m dari kantor.</p>}
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm">
                        <label className="block text-sm font-medium text-gray-700 mb-2">Pilih Nama Anda</label>
                        <select className="w-full p-3 border rounded-lg bg-gray-50 mb-6 focus:ring-2 focus:ring-blue-500 outline-none" value={selectedId} onChange={(e) => setSelectedId(e.target.value)}>
                            <option value="">-- Pilih Karyawan --</option>
                            {employees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                        </select>

                        <div className="grid grid-cols-2 gap-4">
                            <button onClick={() => onAttendance(selectedId, 'IN')} disabled={!inRange || !selectedId || hasIn} className={`p-4 rounded-xl flex flex-col items-center justify-center gap-2 transition font-bold text-white ${!inRange || !selectedId || hasIn ? 'bg-gray-300 cursor-not-allowed' : 'bg-emerald-500 hover:bg-emerald-600 shadow-lg shadow-emerald-200'}`}>
                                <IconClock className="w-6 h-6" /> {hasIn ? 'Sudah Masuk' : 'Absen Masuk'}
                                {hasIn && <span className="text-xs font-normal opacity-90">{formatTime(hasIn.timestamp)}</span>}
                            </button>
                            <button onClick={() => onAttendance(selectedId, 'OUT')} disabled={!inRange || !selectedId || !hasIn || hasOut} className={`p-4 rounded-xl flex flex-col items-center justify-center gap-2 transition font-bold text-white ${!inRange || !selectedId || !hasIn || hasOut ? 'bg-gray-300 cursor-not-allowed' : 'bg-rose-500 hover:bg-rose-600 shadow-lg shadow-rose-200'}`}>
                                <IconLogOut className="w-6 h-6" /> {hasOut ? 'Sudah Pulang' : 'Absen Pulang'}
                                {hasOut && <span className="text-xs font-normal opacity-90">{formatTime(hasOut.timestamp)}</span>}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function AdminLogin({ actualPin, onSuccess }) {
            const [input, setInput] = useState('');
            const [error, setError] = useState(false);
            const handleSubmit = (e) => { e.preventDefault(); if (input === actualPin) onSuccess(); else { setError(true); setInput(''); } };
            return (
                <div className="flex flex-col items-center justify-center min-h-[50vh]">
                    <div className="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm text-center">
                        <IconLock className="w-12 h-12 text-blue-500 mx-auto mb-4" />
                        <h2 className="text-2xl font-bold text-gray-800 mb-2">Akses Admin</h2>
                        <form onSubmit={handleSubmit}>
                            <input type="password" maxLength={6} className="w-full text-center text-3xl tracking-widest p-3 border-2 rounded-lg mb-4 font-mono" value={input} onChange={(e) => { setInput(e.target.value); setError(false); }} placeholder="••••••" autoFocus />
                            {error && <p className="text-red-500 text-sm mb-4">PIN Salah!</p>}
                            <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">Masuk</button>
                        </form>
                    </div>
                </div>
            );
        }

        function AdminDashboard({ employees, setEmployees, logs, settings, setSettings }) {
            const [tab, setTab] = useState('employees');
            return (
                <div className="bg-white rounded-2xl shadow-sm overflow-hidden min-h-[80vh]">
                    <div className="flex border-b">
                        <button onClick={() => setTab('employees')} className={`flex-1 py-4 text-sm font-medium flex items-center justify-center gap-2 ${tab === 'employees' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-500 hover:bg-gray-50'}`}><IconUsers className="w-4 h-4" /> Karyawan</button>
                        <button onClick={() => setTab('reports')} className={`flex-1 py-4 text-sm font-medium flex items-center justify-center gap-2 ${tab === 'reports' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-500 hover:bg-gray-50'}`}><IconFileText className="w-4 h-4" /> Laporan</button>
                        <button onClick={() => setTab('settings')} className={`flex-1 py-4 text-sm font-medium flex items-center justify-center gap-2 ${tab === 'settings' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-500 hover:bg-gray-50'}`}><IconSettings className="w-4 h-4" /> Setting</button>
                    </div>
                    <div className="p-4 md:p-6">
                        {tab === 'employees' && <ManageEmployees employees={employees} setEmployees={setEmployees} />}
                        {tab === 'reports' && <Reports logs={logs} employees={employees} />}
                        {tab === 'settings' && <GlobalSettings settings={settings} setSettings={setSettings} />}
                    </div>
                </div>
            );
        }

function ManageEmployees({ employees }) { 
            const [isEditing, setIsEditing] = useState(false);
            const [formData, setFormData] = useState({ id: null, name: '', shiftStart: '08:00', shiftEnd: '17:00', lateFee: 0, overtimeFee: 0 });
            const [isLoading, setIsLoading] = useState(false);

            // --- FUNGSI RESET DEVICE (BARU) ---
            const handleResetDevice = async (empName, empId) => {
                if (!window.confirm(`Reset Device untuk ${empName}?\n\nLakukan ini HANYA jika karyawan ganti HP.`)) return;
                
                try {
                    const { error } = await supabase
                        .from('employees')
                        .update({ device_id: null }) // Kosongkan device_id di database
                        .eq('id', empId);

                    if (error) throw error;
                    alert(`Device ${empName} berhasil di-reset. Silakan login di HP baru.`);
                } catch (err) {
                    alert('Gagal reset: ' + err.message);
                }
            };
            // ----------------------------------

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                const payload = {
                    name: formData.name,
                    shift_start: formData.shiftStart,
                    shift_end: formData.shiftEnd,
                    late_fee: formData.lateFee,
                    overtime_fee: formData.overtimeFee
                };

                try {
                    if (formData.id) {
                        const { error } = await supabase.from('employees').update(payload).eq('id', formData.id);
                        if (error) throw error;
                        alert('Data berhasil diupdate!');
                    } else {
                        const { error } = await supabase.from('employees').insert([payload]);
                        if (error) throw error;
                        alert('Karyawan berhasil ditambahkan!');
                    }
                    setIsEditing(false);
                    setFormData({ id: null, name: '', shiftStart: '08:00', shiftEnd: '17:00', lateFee: 0, overtimeFee: 0 });
                } catch (error) {
                    alert('Gagal menyimpan: ' + error.message);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleDelete = async (id) => {
                if (!window.confirm('Yakin ingin menghapus karyawan ini?')) return;
                try {
                    const { error } = await supabase.from('employees').delete().eq('id', id);
                    if (error) throw error;
                    alert('Karyawan dihapus.');
                } catch (error) {
                    alert('Gagal menghapus: ' + error.message);
                }
            };

            const handleEdit = (emp) => { setFormData(emp); setIsEditing(true); };

            if (isEditing) return (
                <div>
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="font-bold text-lg">{formData.id ? 'Edit Karyawan' : 'Tambah Karyawan'}</h3>
                        <button onClick={() => setIsEditing(false)} className="text-gray-500 hover:text-gray-700"><IconX /></button>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div><label className="block text-sm text-gray-600">Nama Lengkap</label><input required type="text" className="w-full border p-2 rounded" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} /></div>
                        <div className="grid grid-cols-2 gap-4"><div><label className="block text-sm text-gray-600">Jam Masuk</label><input required type="time" className="w-full border p-2 rounded" value={formData.shiftStart} onChange={e => setFormData({...formData, shiftStart: e.target.value})} /></div><div><label className="block text-sm text-gray-600">Jam Pulang</label><input required type="time" className="w-full border p-2 rounded" value={formData.shiftEnd} onChange={e => setFormData({...formData, shiftEnd: e.target.value})} /></div></div>
                        <div className="grid grid-cols-2 gap-4"><div><label className="block text-sm text-gray-600">Denda Telat (Rp)</label><input required type="number" className="w-full border p-2 rounded" value={formData.lateFee} onChange={e => setFormData({...formData, lateFee: parseInt(e.target.value)})} /></div><div><label className="block text-sm text-gray-600">Fee Lembur / Jam (Rp)</label><input required type="number" className="w-full border p-2 rounded" value={formData.overtimeFee} onChange={e => setFormData({...formData, overtimeFee: parseInt(e.target.value)})} /></div></div>
                        <button type="submit" disabled={isLoading} className="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700 disabled:bg-gray-400">{isLoading ? 'Menyimpan...' : 'Simpan'}</button>
                    </form>
                </div>
            );

            return (
                <div>
                    <div className="flex justify-between items-center mb-6"><h3 className="font-bold text-lg">Daftar Karyawan</h3><button onClick={() => setIsEditing(true)} className="bg-green-600 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2 hover:bg-green-700"><IconPlus className="w-4 h-4" /> Tambah</button></div>
                    <div className="space-y-3">{employees.map(emp => (
                        <div key={emp.id} className="border p-4 rounded-lg flex justify-between items-center bg-gray-50">
                            <div><div className="font-bold text-gray-800">{emp.name}</div><div className="text-xs text-gray-500 mt-1">Shift: {emp.shiftStart} - {emp.shiftEnd} | Denda: {formatCurrency(emp.lateFee)}</div></div>
                            <div className="flex gap-2">
                                {/* TOMBOL RESET DEVICE BARU */}
                                <button onClick={() => handleResetDevice(emp.name, emp.id)} className="p-2 text-orange-500 hover:bg-orange-100 rounded" title="Reset Device (Ganti HP)"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg></button>
                                <button onClick={() => handleEdit(emp)} className="p-2 text-blue-600 hover:bg-blue-100 rounded"><IconEdit2 className="w-4 h-4" /></button>
                                <button onClick={() => handleDelete(emp.id)} className="p-2 text-red-600 hover:bg-red-100 rounded"><IconTrash2 className="w-4 h-4" /></button>
                            </div>
                        </div>
                    ))}</div>
                </div>
            );
        }

 function Reports({ logs, employees }) {
            // Setup tanggal default (awal bulan sampai hari ini)
            const [startDate, setStartDate] = useState(() => { 
                const now = new Date(); 
                return new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0]; 
            });
            const [endDate, setEndDate] = useState(() => new Date().toISOString().split('T')[0]);
            
            // Filter log berdasarkan tanggal
            const filteredLogs = useMemo(() => logs.filter(l => {
                // Pastikan l.date ada isinya sebelum dicek
                return l.date && l.date >= startDate && l.date <= endDate;
            }).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)), [logs, startDate, endDate]);

            // --- FUNGSI HAPUS LOG (BARU) ---
            const handleDeleteLog = async (id) => {
                if (!window.confirm('Hapus data absen ini? \n\nPERHATIAN: Setelah dihapus, karyawan bisa absen ulang untuk hari ini.')) return;

                try {
                    const { error } = await supabase
                        .from('attendance_logs')
                        .delete()
                        .eq('id', id);

                    if (error) throw error;
                    alert('Data berhasil dihapus.');
                    // Tidak perlu refresh manual, karena Realtime Subscription di App() akan otomatis update tabel
                } catch (err) {
                    alert('Gagal menghapus: ' + err.message);
                }
            };

            const downloadCSV = () => {
                const headers = ["Tanggal", "Jam", "Nama", "Tipe", "Status", "Jarak(m)", "Denda", "Bonus", "Catatan"];
                const rows = filteredLogs.map(l => [l.date, formatTime(l.timestamp), l.employeeName, l.type === 'IN' ? 'MASUK' : 'PULANG', l.status, l.distance, l.penalty, l.bonus, l.note]);
                let csvContent = "data:text/csv;charset=utf-8," + [headers, ...rows].map(e => e.join(",")).join("\n");
                const link = document.createElement("a"); link.setAttribute("href", encodeURI(csvContent)); link.setAttribute("download", `Laporan_${startDate}_sd_${endDate}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            return (
                <div>
                    <div className="flex flex-col md:flex-row gap-4 justify-between items-end mb-6">
                        <div className="flex gap-4 w-full md:w-auto">
                            <div className="w-full"><label className="block text-sm text-gray-600 mb-1">Dari</label><input type="date" className="border p-2 rounded w-full" value={startDate} onChange={(e) => setStartDate(e.target.value)} /></div>
                            <div className="w-full"><label className="block text-sm text-gray-600 mb-1">Sampai</label><input type="date" className="border p-2 rounded w-full" value={endDate} onChange={(e) => setEndDate(e.target.value)} /></div>
                        </div>
                        <button onClick={downloadCSV} disabled={filteredLogs.length === 0} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2 hover:bg-blue-700 disabled:bg-gray-400 h-10 shrink-0"><IconDownload className="w-4 h-4" /> Download CSV</button>
                    </div>
                    
                    <div className="overflow-x-auto border rounded-lg">
                        <table className="w-full text-sm text-left">
                            <thead className="bg-gray-100 text-gray-700 uppercase">
                                <tr>
                                    <th className="p-3">Waktu</th>
                                    <th className="p-3">Nama</th>
                                    <th className="p-3">Tipe</th>
                                    <th className="p-3">Status</th>
                                    <th className="p-3 text-right">Nominal</th>
                                    <th className="p-3 text-center">Aksi</th> {/* Kolom Baru */}
                                </tr>
                            </thead>
                            <tbody className="divide-y">
                                {filteredLogs.length === 0 ? 
                                    <tr><td colSpan="6" className="p-4 text-center text-gray-500">Data Kosong</td></tr> : 
                                    filteredLogs.map(log => (
                                    <tr key={log.id} className="hover:bg-gray-50">
                                        <td className="p-3">
                                            <div className="font-bold">{formatDate(log.date)}</div>
                                            <div className="text-gray-500">{formatTime(log.timestamp)}</div>
                                        </td>
                                        <td className="p-3">{log.employeeName}</td>
                                        <td className="p-3">
                                            <span className={`px-2 py-1 rounded text-xs font-bold ${log.type === 'IN' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}`}>
                                                {log.type === 'IN' ? 'MASUK' : 'PULANG'}
                                            </span>
                                        </td>
                                        <td className="p-3"><div className="font-medium">{log.status}</div></td>
                                        <td className="p-3 text-right font-mono">
                                            {log.penalty > 0 && <span className="text-red-600">-{formatCurrency(log.penalty)}</span>}
                                            {log.bonus > 0 && <span className="text-green-600">+{formatCurrency(log.bonus)}</span>}
                                        </td>
                                        <td className="p-3 text-center">
                                            <button 
                                                onClick={() => handleDeleteLog(log.id)}
                                                className="p-2 bg-red-50 text-red-600 rounded hover:bg-red-100 transition"
                                                title="Hapus Log Ini"
                                            >
                                                <IconTrash2 className="w-4 h-4" />
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function GlobalSettings({ settings, setSettings }) {
            const [localSettings, setLocalSettings] = useState(settings);
            const handleSave = () => { setSettings(localSettings); alert('Disimpan!'); };

            return (
                <div className="space-y-6">
                    <div className="bg-orange-50 p-4 rounded-lg border border-orange-200"><h4 className="font-bold text-orange-800 mb-2 flex items-center gap-2"><IconAlertTriangle className="w-4 h-4"/> Area Sensitif</h4><p className="text-sm text-orange-700">Hati-hati mengubah koordinat.</p></div>
                    <div className="grid md:grid-cols-2 gap-4"><div><label className="block text-sm font-medium mb-1">Lat</label><input type="number" step="any" className="w-full border p-2 rounded" value={localSettings.lat} onChange={(e) => setLocalSettings({...localSettings, lat: parseFloat(e.target.value)})} /></div><div><label className="block text-sm font-medium mb-1">Lng</label><input type="number" step="any" className="w-full border p-2 rounded" value={localSettings.lng} onChange={(e) => setLocalSettings({...localSettings, lng: parseFloat(e.target.value)})} /></div></div>
                    <div className="grid md:grid-cols-2 gap-4"><div><label className="block text-sm font-medium mb-1">Radius (m)</label><input type="number" className="w-full border p-2 rounded" value={localSettings.radius} onChange={(e) => setLocalSettings({...localSettings, radius: parseInt(e.target.value)})} /></div><div><label className="block text-sm font-medium mb-1">PIN Admin</label><input type="text" maxLength={6} className="w-full border p-2 rounded" value={localSettings.adminPin} onChange={(e) => setLocalSettings({...localSettings, adminPin: e.target.value})} /></div></div>
                    <button onClick={handleSave} className="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 w-full md:w-auto">Simpan</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
